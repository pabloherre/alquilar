<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — AlquilAR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Poppins, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 40px 32px;
      text-align: center;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 10px 24px rgba(15,23,42,0.07);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
    p { font-size: 0.95rem; color: #64748b; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: #0f766e;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>Estás sin conexión. Los contratos y recibos que ya visitaste siguen disponibles.</p>
    <a href="/">Volver al inicio</a>
  </div>
</body>
</html>
